<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- Background -->
  <circle cx="120" cy="120" r="110" fill="#FFF0E6"/>

  <!-- Large empty speech bubble -->
  <path d="M32 64 Q32 36 56 36 L184 36 Q208 36 208 64 L208 140 Q208 168 184 168 L146 168 L120 204 L94 168 L56 168 Q32 168 32 140Z"
    fill="white" stroke="#EAD9CC" stroke-width="3"/>

