  <path d="M196 52 L197.5 57 L202.5 57 L198.5 60 L200 65 L196 62.5 L192 65 L193.5 60 L189.5 57 L194.5 57Z" fill="#E8847A" opacity="0.3"/>
  <circle cx="50" cy="132" r="5" fill="#F5A623" opacity="0.3"/>
  <circle cx="190" cy="136" r="5" fill="#4CAF82" opacity="0.3"/>
</svg>
