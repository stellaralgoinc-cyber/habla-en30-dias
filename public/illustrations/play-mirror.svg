<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- Background -->
  <circle cx="120" cy="120" r="110" fill="#FFF0E6"/>

  <!-- Mirror frame -->
  <rect x="68" y="50" width="104" height="130" rx="20" fill="#E07B39" opacity="0.85"/>
  <rect x="76" y="58" width="88" height="114" rx="14" fill="#6DB8D4" opacity="0.2"/>
  <rect x="76" y="58" width="88" height="114" rx="14" fill="white" opacity="0.5"/>

  <!-- Mirror handle -->
  <rect x="108" y="180" width="24" height="28" rx="8" fill="#C4622A"/>

  <!-- Reflection shine -->
  <path d="M84 66 Q96 62 88 82" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- Parent face in mirror (left side) -->
  <circle cx="100" cy="110" r="20" fill="#F5C4A0"/>
  <!-- Parent hair -->
  <path d="M82 102 Q86 87 100 86 Q114 87 118 102 Q112 90 100 89 Q88 90 82 102Z" fill="#3D2314" opacity="0.8"/>
  <!-- Parent eye left -->
  <ellipse cx="94" cy="108" rx="2.5" ry="3" fill="#3D2314"/>
  <!-- Parent eye right -->
  <ellipse cx="106" cy="108" rx="2.5" ry="3" fill="#3D2314"/>
  <!-- Parent smile -->
  <path d="M94 116 Q100 122 106 116" stroke="#3D2314" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Parent cheeks -->
  <ellipse cx="90" cy="114" rx="7" ry="5" fill="#E8847A" opacity="0.25"/>
  <ellipse cx="110" cy="114" rx="7" ry="5" fill="#E8847A" opacity="0.25"/>

  <!-- Child face in mirror (right, reflection) -->
  <circle cx="140" cy="112" r="16" fill="#F5C4A0" opacity="0.9"/>
  <!-- Child hair -->
  <path d="M126 106 Q128 95 140 94 Q152 95 154 106 Q150 97 140 96 Q130 97 126 106Z" fill="#7A5C4A" opacity="0.75"/>
  <!-- Child eyes -->
  <ellipse cx="135" cy="110" rx="2" ry="2.5" fill="#3D2314"/>
  <ellipse cx="145" cy="110" rx="2" ry="2.5" fill="#3D2314"/>
  <!-- Child smile -->
  <path d="M135 118 Q140 123 145 118" stroke="#3D2314" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Child cheeks -->
  <ellipse cx="132" cy="115" rx="6" ry="4" fill="#E8847A" opacity="0.25"/>
  <ellipse cx="148" cy="115" rx="6" ry="4" fill="#E8847A" opacity="0.25"/>

  <!-- Sparkles around mirror -->
  <path d="M50 70 L51.5 75 L56.5 75 L52.5 78 L54 83 L50 80.5 L46 83 L47.5 78 L43.5 75 L48.5 75Z" fill="#F5A623" opacity="0.6"/>
  <path d="M192 80 L193 84 L197 84 L194 86.5 L195 90.5 L192 88.5 L189 90.5 L190 86.5 L187 84 L191 84Z" fill="#9B8EC4" opacity="0.6"/>
  <circle cx="52" cy="160" r="6" fill="#4CAF82" opacity="0.4"/>
  <circle cx="192" cy="158" r="6" fill="#E8847A" opacity="0.4"/>
</svg>
