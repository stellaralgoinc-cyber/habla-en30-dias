<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- Background -->
  <circle cx="120" cy="120" r="110" fill="#FFF0E6"/>

  <!-- Book shadow -->
  <ellipse cx="122" cy="196" rx="64" ry="10" fill="#EAD9CC" opacity="0.5"/>

  <!-- Book spine -->
  <rect x="58" y="48" width="18" height="152" rx="8" fill="#C4622A"/>

  <!-- Book cover (right page) -->
  <rect x="72" y="48" width="110" height="152" rx="8" fill="#E07B39"/>
  <!-- Book cover texture -->
  <rect x="72" y="48" width="110" height="152" rx="8" fill="white" opacity="0.08"/>

  <!-- Page (inner) -->
  <rect x="80" y="56" width="94" height="136" rx="4" fill="white"/>

  <!-- Lines on page -->
  <line x1="92" y1="80" x2="162" y2="80" stroke="#EAD9CC" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="96" x2="162" y2="96" stroke="#EAD9CC" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="112" x2="162" y2="112" stroke="#EAD9CC" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="128" x2="140" y2="128" stroke="#EAD9CC" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="144" x2="152" y2="144" stroke="#EAD9CC" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="160" x2="130" y2="160" stroke="#EAD9CC" stroke-width="2" stroke-linecap="round"/>

  <!-- Small heart bullet on first line -->
  <path d="M90 77 C90 75 88 74 87 75 C86 74 84 75 84 77 C84 79 87 81 90 83 C93 81 96 79 96 77 C96 75 94 74 93 75 C92 74 90 75 90 77Z" fill="#E8847A" opacity="0.6"/>

  <!-- Pen / pencil -->
  <rect x="154" y="140" width="12" height="56" rx="3" transform="rotate(-30 154 140)" fill="#F5A623"/>
  <path d="M165 190 L170 200 L158 196Z" fill="#3D2314" opacity="0.7" transform="rotate(-30 165 190)"/>
  <!-- Pencil tip -->
  <path d="M165 188 L170 196 L158 194Z" fill="#F5C4A0" transform="rotate(-30 165 188)"/>
  <!-- Pencil eraser -->
  <rect x="154" y="138" width="12" height="8" rx="2" transform="rotate(-30 154 138)" fill="#E8847A"/>

  <!-- Star near top -->
  <path d="M148 64 L149.5 69 L154.5 69 L150.5 72 L152 77 L148 74.5 L144 77 L145.5 72 L141.5 69 L146.5 69Z" fill="#F5A623" opacity="0.7"/>

  <!-- Side dots -->
  <circle cx="44" cy="90" r="6" fill="#9B8EC4" opacity="0.4"/>
  <circle cx="44" cy="148" r="5" fill="#4CAF82" opacity="0.4"/>
  <circle cx="200" cy="88" r="5" fill="#E8847A" opacity="0.4"/>
</svg>
