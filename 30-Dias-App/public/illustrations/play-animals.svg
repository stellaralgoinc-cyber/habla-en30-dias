  <path d="M78 126 Q82 130 86 126" stroke="#3D2314" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Cat tail -->
  <path d="M48 175 Q28 150 40 130 Q50 115 58 135" stroke="#F5C4A0" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Duck -->
  <!-- Duck body -->
  <ellipse cx="158" cy="158" rx="28" ry="22" fill="#F5A623" opacity="0.85"/>
  <!-- Duck head -->
  <circle cx="170" cy="128" r="20" fill="#F5A623" opacity="0.9"/>
